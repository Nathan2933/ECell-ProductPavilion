# Optional: run ngrok alongside local Next.js on port 3000.
# Set NGROK_AUTHTOKEN in your local .env (same folder; file is gitignored).
version: "3"
services:
  ngrok:
    image: ngrok/ngrok:latest
    command: http host.docker.internal:3000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
